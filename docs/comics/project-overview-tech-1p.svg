<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- Background -->
  <rect width="800" height="600" fill="#1B2838"/>

  <!-- Title bar -->
  <rect width="800" height="60" fill="#1B2838"/>
  <line x1="0" y1="60" x2="800" y2="60" stroke="#3498DB" stroke-width="2"/>
  <text x="20" y="40" font-family="monospace" font-size="22" fill="#FFFFFF">claude-project-template</text>
  <text x="780" y="40" font-family="monospace" font-size="14" fill="#3498DB" text-anchor="end">v0.1.0</text>

  <!-- Main panel -->
  <rect x="20" y="70" width="760" height="470" fill="#FFFFFF" stroke="#2C3E50" stroke-width="2"/>

  <!-- Gear decorations in corners -->
  <!-- Top-left gear -->
  <g transform="translate(35, 85)">
    <circle cx="0" cy="0" r="6" fill="none" stroke="#3498DB" stroke-width="1.5" opacity="0.3"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#3498DB" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#3498DB" stroke-width="1.5" opacity="0.3"/>
  </g>
  <!-- Top-right gear -->
  <g transform="translate(765, 85)">
    <circle cx="0" cy="0" r="6" fill="none" stroke="#3498DB" stroke-width="1.5" opacity="0.3"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#3498DB" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#3498DB" stroke-width="1.5" opacity="0.3"/>
  </g>
  <!-- Bottom-left gear -->
  <g transform="translate(35, 525)">
    <circle cx="0" cy="0" r="6" fill="none" stroke="#3498DB" stroke-width="1.5" opacity="0.3"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#3498DB" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#3498DB" stroke-width="1.5" opacity="0.3"/>
  </g>
  <!-- Bottom-right gear -->
  <g transform="translate(765, 525)">
    <circle cx="0" cy="0" r="6" fill="none" stroke="#3498DB" stroke-width="1.5" opacity="0.3"/>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#3498DB" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#3498DB" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Circuit trace decorations along left edge -->
  <path d="M 20 150 L 40 150 L 40 170 L 50 170" stroke="#3498DB" stroke-width="1" fill="none" opacity="0.15"/>
  <path d="M 20 200 L 45 200 L 45 220 L 55 220" stroke="#3498DB" stroke-width="1" fill="none" opacity="0.15"/>
  <path d="M 20 400 L 40 400 L 40 420 L 50 420" stroke="#3498DB" stroke-width="1" fill="none" opacity="0.15"/>
  <path d="M 20 450 L 35 450 L 35 465 L 50 465" stroke="#3498DB" stroke-width="1" fill="none" opacity="0.15"/>

  <!-- ============================================ -->
  <!-- ROBOT EXPLAINER CHARACTER (left side) -->
  <!-- ============================================ -->
  <g transform="translate(120, 200)">
    <!-- Legs -->
    <rect x="-15" y="120" width="14" height="25" rx="3" fill="#2C3E50"/>
    <rect x="1" y="120" width="14" height="25" rx="3" fill="#2C3E50"/>

    <!-- Body -->
    <rect x="-30" y="40" width="60" height="80" rx="8" fill="#3498DB"/>
    <!-- Body detail lines -->
    <line x1="-20" y1="60" x2="20" y2="60" stroke="#2980B9" stroke-width="1.5"/>
    <line x1="-20" y1="75" x2="20" y2="75" stroke="#2980B9" stroke-width="1.5"/>
    <line x1="-20" y1="90" x2="20" y2="90" stroke="#2980B9" stroke-width="1.5"/>
    <!-- Power indicator -->
    <circle cx="20" cy="50" r="4" fill="#2ECC71"/>

    <!-- Left arm (pointing right toward diagram) -->
    <rect x="30" y="55" width="45" height="10" rx="4" fill="#2C3E50"/>
    <!-- Hand -->
    <circle cx="78" cy="60" r="7" fill="#ECF0F1"/>

    <!-- Right arm (holding wrench) -->
    <g transform="translate(-30, 55)">
      <rect x="-40" y="0" width="40" height="10" rx="4" fill="#2C3E50"/>
      <!-- Wrench -->
      <line x1="-52" y1="5" x2="-40" y2="5" stroke="#7F8C8D" stroke-width="3"/>
      <circle cx="-55" cy="5" r="6" fill="none" stroke="#7F8C8D" stroke-width="2.5"/>
    </g>

    <!-- Head -->
    <rect x="-20" y="0" width="40" height="40" rx="6" fill="#ECF0F1"/>
    <!-- Screen face -->
    <rect x="-14" y="8" width="28" height="22" rx="3" fill="#2C3E50"/>
    <!-- Eyes -->
    <circle cx="-5" cy="17" r="3" fill="#3498DB"/>
    <circle cx="5" cy="17" r="3" fill="#3498DB"/>
    <!-- Mouth (happy line) -->
    <path d="M -5 24 Q 0 28 5 24" stroke="#3498DB" stroke-width="1.5" fill="none"/>

    <!-- Antenna -->
    <line x1="0" y1="0" x2="0" y2="-12" stroke="#7F8C8D" stroke-width="2"/>
    <circle cx="0" cy="-14" r="4" fill="#3498DB"/>
  </g>

  <!-- ============================================ -->
  <!-- SPEECH BUBBLE (top, spanning toward right) -->
  <!-- ============================================ -->
  <g transform="translate(230, 100)">
    <!-- Bubble rectangle -->
    <rect x="0" y="0" width="520" height="55" rx="4" fill="#FFFFFF" stroke="#2C3E50" stroke-width="1.5"/>
    <!-- Pointer triangle (pointing left toward robot) -->
    <polygon points="-12,30 0,22 0,38" fill="#FFFFFF" stroke="#2C3E50" stroke-width="1.5"/>
    <!-- Cover the stroke where triangle meets box -->
    <line x1="0" y1="23" x2="0" y2="37" stroke="#FFFFFF" stroke-width="2"/>
    <!-- Text -->
    <text x="260" y="35" text-anchor="middle" font-family="monospace" font-size="18" fill="#2C3E50" font-weight="bold">One template. Twelve skills. Zero setup friction.</text>
  </g>

  <!-- ============================================ -->
  <!-- THREE-LAYER ARCHITECTURE DIAGRAM (right) -->
  <!-- ============================================ -->
  <g transform="translate(340, 190)">
    <!-- Layer 1: Skills (top) -->
    <rect x="0" y="0" width="400" height="90" rx="4" fill="#EBF5FB" stroke="#3498DB" stroke-width="2"/>
    <text x="15" y="25" font-family="monospace" font-size="14" fill="#2C3E50" font-weight="bold">SKILLS</text>
    <!-- Skill tags row 1 -->
    <g transform="translate(15, 35)">
      <rect x="0" y="0" width="55" height="22" rx="3" fill="#3498DB"/>
      <text x="27" y="15" text-anchor="middle" font-family="monospace" font-size="10" fill="#FFFFFF">/lint</text>

      <rect x="62" y="0" width="55" height="22" rx="3" fill="#3498DB"/>
      <text x="89" y="15" text-anchor="middle" font-family="monospace" font-size="10" fill="#FFFFFF">/test</text>

      <rect x="124" y="0" width="68" height="22" rx="3" fill="#3498DB"/>
      <text x="158" y="15" text-anchor="middle" font-family="monospace" font-size="10" fill="#FFFFFF">/review</text>

      <rect x="199" y="0" width="62" height="22" rx="3" fill="#3498DB"/>
      <text x="230" y="15" text-anchor="middle" font-family="monospace" font-size="10" fill="#FFFFFF">/check</text>

      <rect x="268" y="0" width="55" height="22" rx="3" fill="#3498DB"/>
      <text x="295" y="15" text-anchor="middle" font-family="monospace" font-size="10" fill="#FFFFFF">/docs</text>

      <rect x="330" y="0" width="55" height="22" rx="3" fill="#3498DB"/>
      <text x="357" y="15" text-anchor="middle" font-family="monospace" font-size="10" fill="#FFFFFF">/ship</text>
    </g>
    <!-- Skill tags row 2 -->
    <g transform="translate(15, 62)">
      <rect x="0" y="0" width="68" height="22" rx="3" fill="#3498DB"/>
      <text x="34" y="15" text-anchor="middle" font-family="monospace" font-size="10" fill="#FFFFFF">/comic</text>

      <rect x="75" y="0" width="78" height="22" rx="3" fill="#3498DB"/>
      <text x="114" y="15" text-anchor="middle" font-family="monospace" font-size="10" fill="#FFFFFF">/version</text>

      <rect x="160" y="0" width="100" height="22" rx="3" fill="#3498DB"/>
      <text x="210" y="15" text-anchor="middle" font-family="monospace" font-size="10" fill="#FFFFFF">/bash-review</text>

      <rect x="267" y="0" width="118" height="22" rx="3" fill="#2C3E50"/>
      <text x="326" y="15" text-anchor="middle" font-family="monospace" font-size="10" fill="#FFFFFF">+ 3 more...</text>
    </g>

    <!-- Connector arrow 1→2 -->
    <line x1="200" y1="90" x2="200" y2="110" stroke="#2C3E50" stroke-width="2"/>
    <polygon points="194,108 200,116 206,108" fill="#2C3E50"/>

    <!-- Layer 2: Hooks (middle) -->
    <rect x="0" y="116" width="400" height="70" rx="4" fill="#FEF9E7" stroke="#F39C12" stroke-width="2"/>
    <text x="15" y="141" font-family="monospace" font-size="14" fill="#2C3E50" font-weight="bold">HOOKS</text>
    <g transform="translate(15, 150)">
      <rect x="0" y="0" width="160" height="22" rx="3" fill="#F39C12"/>
      <text x="80" y="15" text-anchor="middle" font-family="monospace" font-size="10" fill="#FFFFFF">auto-lint on save</text>

      <rect x="168" y="0" width="210" height="22" rx="3" fill="#F39C12"/>
      <text x="273" y="15" text-anchor="middle" font-family="monospace" font-size="10" fill="#FFFFFF">review reminder on stop</text>
    </g>

    <!-- Connector arrow 2→3 -->
    <line x1="200" y1="186" x2="200" y2="206" stroke="#2C3E50" stroke-width="2"/>
    <polygon points="194,204 200,212 206,204" fill="#2C3E50"/>

    <!-- Layer 3: Permissions (bottom) -->
    <rect x="0" y="212" width="400" height="70" rx="4" fill="#FDEDEC" stroke="#E74C3C" stroke-width="2"/>
    <text x="15" y="237" font-family="monospace" font-size="14" fill="#2C3E50" font-weight="bold">PERMISSIONS</text>
    <g transform="translate(15, 245)">
      <text x="0" y="14" font-family="monospace" font-size="12" fill="#2ECC71">ALLOW</text>
      <text x="55" y="14" font-family="monospace" font-size="11" fill="#7F8C8D">edit, test, lint, git</text>

      <text x="230" y="14" font-family="monospace" font-size="12" fill="#E74C3C">DENY</text>
      <text x="275" y="14" font-family="monospace" font-size="11" fill="#7F8C8D">.env, rm -rf, sudo</text>
    </g>
  </g>

  <!-- Caption bar -->
  <rect x="0" y="545" width="800" height="55" fill="#1B2838"/>
  <line x1="0" y1="545" x2="800" y2="545" stroke="#3498DB" stroke-width="1"/>
  <text x="400" y="578" text-anchor="middle" font-family="monospace" font-size="14" fill="#7F8C8D">Claude Project Template -- pre-configured Claude Code for Python projects</text>
</svg>
